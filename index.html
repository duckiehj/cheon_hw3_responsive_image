<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://use.typekit.net/jys8pbu.css">
    <link href="css/grid.css" rel="stylesheet" type="text/css">
    <link href="css/main.css" rel="stylesheet" type="text/css">
    <title>Responsive Image Sizing</title>
</head>
    <body>
        <section class="grid-con center-grid-con">
            <h2 class="col-span-full">Squeeze The Burst AD</h2>
            <div class="col-span-full">
                <img
                    sizes="
                    (min-width: 1200px) 1000px,
                    (min-width: 768px) 600px,
                    100vw"
                    srcset="
                    images/billboard_desktop_tivvgz_c_scale,w_320.webp 320w,
                    images/billboard_desktop_tivvgz_c_scale,w_833.webp 833w,
                    images/billboard_desktop_tivvgz_c_scale,w_1000.webp 1000w"
                    src="images/billboard_desktop_tivvgz_c_scale,w_1000.webp"
                    alt="Billboard image of Squeezit advertisement">
            </div>
        </section>



        <section class="grid-con center-grid-con">
            <h2 class="col-span-full">SQUEEZE THE GOOD, SAVE THE WASTE</h2>
            <picture class="col-span-full m-col-span-full">               
                <source srcset="images/recycle_desk.webp" media="(min-width: 768px)" alt="Plastic bottles">
                <img src="images/recycle_mobile.webp" alt="Plastic bottles">
            </picture>
        </section>


        <section class="grid-con center-grid-con">
            <div class="hero col-span-full">
            <h2 id="css-img">Squeeze The Burst</h2>
            </div>
        </section>



        <script src="js/main.js"></script>   
    </body>
</html>
